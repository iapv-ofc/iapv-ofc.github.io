<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IAPV - Sistema de Unidades</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #1a1a1a;
            --accent: #ceaa5e;
            --bg: #f8f9fa;
            --white: #ffffff;
            --gray: #666;
            --radius: 12px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

        body { background-color: var(--bg); color: var(--primary); line-height: 1.6; }

        header { 
            background: var(--primary); padding: 20px; color: var(--white); 
            text-align: center; position: sticky; top: 0; z-index: 100;
        }

        .container { max-width: 800px; margin: 0 auto; padding: 20px; }

        /* Filtro e Seleção */
        .selector-box { background: var(--white); padding: 15px; border-radius: var(--radius); margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        select { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ddd; font-size: 16px; outline: none; }

        /* Info da Unidade */
        .unit-card { background: var(--white); padding: 25px; border-radius: var(--radius); box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 25px; }
        .unit-card h2 { color: var(--accent); margin-bottom: 10px; font-size: 1.5rem; }
        .info-row { margin-bottom: 10px; font-size: 0.95rem; display: flex; align-items: flex-start; gap: 10px; }
        .map-container { width: 100%; height: 250px; border-radius: var(--radius); overflow: hidden; margin-top: 15px; border: 1px solid #eee; }
        iframe { width: 100%; height: 100%; border: none; }

        /* Eventos */
        .events-title { margin-bottom: 15px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--gray); font-size: 0.8rem; }
        .event-card { 
            background: var(--white); display: flex; border-radius: var(--radius); 
            overflow: hidden; margin-bottom: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            border-left: 5px solid var(--accent);
        }
        .event-img { width: 100px; height: 100px; object-fit: cover; }
        .event-info { padding: 15px; flex: 1; }
        .event-info h3 { font-size: 1.1rem; margin-bottom: 5px; }
        .event-date { font-size: 0.85rem; color: var(--gray); font-weight: 600; }

        /* Admin Styles */
        #admin-panel { display: none; background: #fff; border-top: 2px solid var(--accent); padding: 20px; margin-top: 40px; border-radius: var(--radius); }
        .admin-btn { 
            position: fixed; bottom: 20px; right: 20px; background: var(--primary); 
            color: white; border: none; width: 50px; height: 50px; border-radius: 50%; 
            cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        input, textarea { width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 6px; }
        .btn-save { background: #28a745; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; width: 100%; font-weight: bold; }

        @media (max-width: 600px) {
            .event-card { flex-direction: column; }
            .event-img { width: 100%; height: 150px; }
        }
    </style>
</head>
<body>

<header>
    <h1>IAPV</h1>
</header>

<div class="container">
    <div class="selector-box">
        <select id="unit-select" onchange="updateView()">
            <option value="">Selecione uma unidade...</option>
        </select>
    </div>

    <div id="unit-details" style="display: none;">
        <div class="unit-card">
            <h2 id="view-name">Nome da Unidade</h2>
            <div class="info-row">📍 <span id="view-address">...</span></div>
            <div class="info-row">⏰ <span id="view-times">...</span></div>
            
            <div id="view-map" class="map-container"></div>
            
            <div style="margin-top: 20px; display: flex; gap: 15px;">
                <a id="view-insta" href="#" target="_blank" style="text-decoration: none;">Instagram</a>
                <a id="view-yt" href="#" target="_blank" style="text-decoration: none;">YouTube</a>
            </div>
        </div>

        <div class="events-title">Próximos Eventos</div>
        <div id="events-list">
            </div>
    </div>

    <div id="admin-panel">
        <h3>Painel do Coordenador</h3>
        <p style="font-size: 0.8rem; margin-bottom: 15px; color: var(--gray);">Adicionar novo evento para esta unidade:</p>
        <input type="text" id="form-title" placeholder="Título do Evento">
        <input type="date" id="form-date">
        <input type="time" id="form-time">
        <textarea id="form-desc" placeholder="Descrição"></textarea>
        <input type="text" id="form-img" placeholder="URL da Imagem">
        <button class="btn-save" onclick="handleSaveEvent()">Salvar Evento</button>
        <button onclick="document.getElementById('admin-panel').style.display='none'" style="background:none; border:none; color:red; margin-top:10px; cursor:pointer; width:100%;">Fechar</button>
    </div>
</div>

<button class="admin-btn" onclick="openAdmin()">⚙️</button>

<script>
    // --- CONFIGURAÇÕES ---
    const API_URL = "https://script.google.com/macros/s/AKfycbwENgIzxVzb11HwvfELC2QthmyIyyinHpqw3M1QUoAYApFfGNSQpZO005Pe40EcjY2guA/exec"; // Cole a URL da implantação aqui
    const AUTH_KEY = "1008"; // Mesma senha configurada na planilha

    let allUnits = [];
    let allEvents = [];

    // --- CARREGAMENTO INICIAL ---
    async function init() {
        try {
            const [unidades, eventos] = await Promise.all([
                fetch(`${API_URL}?sheet=unidades`).then(r => r.json()),
                fetch(`${API_URL}?sheet=eventos`).then(r => r.json())
            ]);

            allUnits = unidades;
            allEvents = eventos;

            const select = document.getElementById("unit-select");
            allUnits.forEach(unit => {
                let opt = new Option(unit.Nome, unit.ID);
                select.add(opt);
            });
        } catch (e) {
            console.error("Erro ao carregar dados", e);
            alert("Erro ao conectar com a planilha.");
        }
    }

    // --- ATUALIZAÇÃO DA TELA ---
    function updateView() {
        const id = document.getElementById("unit-select").value;
        if (!id) return;

        const unit = allUnits.find(u => u.ID === id);
        document.getElementById("unit-details").style.display = "block";
        
        // Preenche dados da unidade
        document.getElementById("view-name").innerText = unit.Nome;
        document.getElementById("view-address").innerText = unit.Endereço;
        document.getElementById("view-times").innerText = unit.Horários;
        document.getElementById("view-insta").href = unit.Instagram;
        document.getElementById("view-yt").href = unit.YouTube;
        
        // Mapa
        document.getElementById("view-map").innerHTML = `<iframe src="${unit.Link_Mapa}"></iframe>`;

        // Filtra e renderiza eventos
        renderEvents(id);
    }

    function renderEvents(unitId) {
        const list = document.getElementById("events-list");
        list.innerHTML = "";

        // Filtra eventos da unidade ou globais
        const filtered = allEvents.filter(e => e.Unidade_ID === unitId || e.Unidade_ID === "global");

        if (filtered.length === 0) {
            list.innerHTML = "<p style='color:#999;'>Nenhum evento programado.</p>";
            return;
        }

        filtered.forEach(ev => {
            list.innerHTML += `
                <div class="event-card">
                    <img src="${ev.URL_Imagem}" class="event-img" onerror="this.src='https://via.placeholder.com/150'">
                    <div class="event-info">
                        <div class="event-date">${new Date(ev.Data).toLocaleDateString('pt-BR')} às ${ev.Horário}</div>
                        <h3>${ev.Título}</h3>
                        <p style="font-size: 0.85rem; color: #555;">${ev.Descrição}</p>
                    </div>
                </div>
            `;
        });
    }

    // --- FUNÇÕES ADMIN ---
    function openAdmin() {
        const pass = prompt("Senha do Coordenador:");
        if (pass === AUTH_KEY) {
            document.getElementById("admin-panel").style.display = "block";
            window.scrollTo(0, document.body.scrollHeight);
        } else {
            alert("Acesso negado.");
        }
    }

    async function handleSaveEvent() {
        const unitId = document.getElementById("unit-select").value;
        if (!unitId) return alert("Selecione uma unidade primeiro.");

        const data = [
            unitId,
            document.getElementById("form-title").value,
            document.getElementById("form-date").value,
            document.getElementById("form-time").value,
            document.getElementById("form-desc").value,
            document.getElementById("form-img").value
        ];

        if (data.includes("")) return alert("Preencha todos os campos.");

        const btn = document.querySelector(".btn-save");
        btn.innerText = "Salvando...";
        btn.disabled = true;

        try {
            const resp = await fetch(API_URL, {
                method: "POST",
                body: JSON.stringify({
                    auth: AUTH_KEY,
                    sheet: "eventos",
                    action: "add",
                    data: data
                })
            });

            const result = await resp.json();
            if (result.success) {
                alert("Evento salvo com sucesso!");
                location.reload(); // Recarrega para mostrar o novo evento
            }
        } catch (e) {
            alert("Erro ao salvar. Verifique o console.");
        } finally {
            btn.innerText = "Salvar Evento";
            btn.disabled = false;
        }
    }

    // Inicia o sistema
    init();
</script>

</body>
</html>
